<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a4a"/>
      <stop offset="100%" stop-color="#5b3fa0"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="10" fill="url(#bg)"/>
  <!-- Compass pivot circle at top -->
  <circle cx="50" cy="22" r="7" fill="none" stroke="white" stroke-width="3.5"/>
  <!-- Left arm of compass -->
  <line x1="45" y1="27" x2="24" y2="78" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right arm of compass -->
  <line x1="55" y1="27" x2="76" y2="78" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Cross bar (square/set square element) -->
  <line x1="32" y1="58" x2="68" y2="58" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Bottom tips -->
  <circle cx="24" cy="79" r="2.5" fill="white"/>
  <circle cx="76" cy="79" r="2.5" fill="white"/>
</svg>
